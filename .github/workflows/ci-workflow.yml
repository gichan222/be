name: CI

on:
  pull_request:
    branches: ["dev", "main"]
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      gateway: ${{ steps.filter.outputs.gateway }}
      greenroom: ${{ steps.filter.outputs.greenroom }}
      notification: ${{ steps.filter.outputs.notification }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth:
              - 'auth/**'
            gateway:
              - 'gateway/**'
            greenroom:
              - 'greenroom/**'
            notification:
              - 'notification/**'
  

  test-auth:
    needs: detect-changes
    if: needs.detect-changes.outputs.auth == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: auth

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Run tests
        run: ./gradlew clean test


  test-gateway:
    needs: detect-changes
    if: needs.detect-changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: gateway

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Run tests
        run: ./gradlew clean test


  test-greenroom:
    needs: detect-changes
    if: needs.detect-changes.outputs.greenroom == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: greenroom

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Run tests
        run: ./gradlew clean test


  test-notification:
    needs: detect-changes
    if: needs.detect-changes.outputs.notification == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: notification

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Run tests
        run: ./gradlew clean test
  

  build-auth:
    needs: [detect-changes, test-auth]
    if: needs.detect-changes.outputs.auth == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build image
        run: docker build -t $IMAGE_PREFIX/auth:latest ./auth

      - name: Push image
        if: github.event_name == 'push'
        run: docker push $IMAGE_PREFIX/auth:latest

      - name: Trigger Auth CD
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: cd.auth.yml
          ref: main



  build-gateway:
    needs: [detect-changes, test-gateway]
    if: needs.detect-changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build image
        run: docker build -t $IMAGE_PREFIX/gateway:latest ./gateway

      - name: Push image
        if: github.event_name == 'push'
        run: docker push $IMAGE_PREFIX/gateway:latest


      - name: Trigger Gateway CD
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: cd.gateway.yml
          ref: main



  build-greenroom:
    needs: [detect-changes, test-greenroom]
    if: needs.detect-changes.outputs.greenroom == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build image
        run: docker build -t $IMAGE_PREFIX/greenroom:latest ./greenroom

      - name: Push image
        if: github.event_name == 'push'
        run: docker push $IMAGE_PREFIX/greenroom:latest

      - name: Trigger Greenroom CD
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: cd.greenroom.yml
          ref: main


  build-notification:
    needs: [detect-changes, test-notification]
    if: needs.detect-changes.outputs.notification == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build image
        run: docker build -t $IMAGE_PREFIX/notification:latest ./notification

      - name: Push image
        if: github.event_name == 'push'
        run: docker push $IMAGE_PREFIX/notification:latest

      - name: Trigger Notification CD
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: cd.notification.yml
          ref: main