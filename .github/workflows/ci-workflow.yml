name: CI

on:
  pull_request:
    branches: ["dev", "main"]
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      gateway: ${{ steps.filter.outputs.gateway }}
      greenroom: ${{ steps.filter.outputs.greenroom }}
      notification: ${{ steps.filter.outputs.notification }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed services
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            auth:
              - 'auth/**'
            gateway:
              - 'gateway/**'
            greenroom:
              - 'greenroom/**'
            notification:
              - 'notification/**'

  build-auth:
    needs: detect-changes
    if: needs.detect-changes.outputs.auth == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build image
        run: docker build -t $IMAGE_PREFIX/auth:latest ./auth

      - name: Push image
        if: github.event_name == 'push'
        run: docker push $IMAGE_PREFIX/auth:latest


  build-gateway:
    needs: detect-changes
    if: needs.detect-changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build image
        run: docker build -t $IMAGE_PREFIX/gateway:latest ./gateway

      - name: Push image
        if: github.event_name == 'push'
        run: docker push $IMAGE_PREFIX/gateway:latest


  build-greenroom:
    needs: detect-changes
    if: needs.detect-changes.outputs.greenroom == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build image
        run: docker build -t $IMAGE_PREFIX/greenroom:latest ./greenroom

      - name: Push image
        if: github.event_name == 'push'
        run: docker push $IMAGE_PREFIX/greenroom:latest


  build-notification:
    needs: detect-changes
    if: needs.detect-changes.outputs.notification == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build image
        run: docker build -t $IMAGE_PREFIX/notification:latest ./notification

      - name: Push image
        if: github.event_name == 'push'
        run: docker push $IMAGE_PREFIX/notification:latest