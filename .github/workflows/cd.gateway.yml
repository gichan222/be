name: CD - Deploy Gateway to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'gateway/**'
      - '.github/workflows/cd.gateway.yml'
      - 'docker-compose.gateway.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  deploy:
    name: Deploy Gateway to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST_GATEWAY }}
          username: ${{ secrets.EC2_USER_GATEWAY }}
          key: ${{ secrets.EC2_SSH_KEY_GATEWAY }}
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.BASTION_USER }}
          proxy_key: ${{ secrets.BASTION_SSH_KEY }}
          script: |
            set -e

            cd ~/app
            mkdir -p gateway

            cat > gateway/.env <<'EOF'
            ${{ secrets.GATEWAY_ENV_FILE }}
            EOF

            # Log in to GHCR using a PAT stored as a repository secret
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            
            # Export IMAGE_PREFIX for docker-compose interpolation
            export IMAGE_PREFIX=ghcr.io/${{ github.repository_owner }}
            # Pull latest image for gateway
            docker compose -f docker-compose.gateway.yml pull gateway

            # Restart gateway service
            echo "Restarting gateway..."
            docker compose -f docker-compose.gateway.yml up -d --no-deps gateway
            echo "gateway restarted."

            # Remove dangling images to free disk space
            docker image prune -f
