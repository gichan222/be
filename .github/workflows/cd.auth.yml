name: CD - Deploy Auth to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'auth/**'
      - '.github/workflows/cd.auth.yml'
      - 'docker-compose.auth.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  deploy:
    name: Deploy Auth to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST_AUTH }}
          username: ${{ secrets.EC2_USER_AUTH }}
          key: ${{ secrets.EC2_SSH_KEY_AUTH }}
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.BASTION_USER }}
          proxy_key: ${{ secrets.BASTION_SSH_KEY }}
          script: |
            set -e

            cd ~/app
            mkdir -p auth

            cat > auth/.env <<'EOF'
            ${{ secrets.AUTH_ENV_FILE }}
            EOF

            # Log in to GHCR using a PAT stored as a repository secret
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            # Export IMAGE_PREFIX for docker-compose interpolation
            export IMAGE_PREFIX=ghcr.io/${{ github.repository_owner }}

            # Pull latest image for auth
            docker compose -f docker-compose.auth.yml pull auth

            # Restart auth service
            echo "Restarting auth..."
            docker compose -f docker-compose.auth.yml up -d --no-deps auth
            echo "auth restarted."

            # Remove dangling images to free disk space
            docker image prune -f
